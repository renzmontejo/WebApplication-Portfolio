<div class="flex min-h-screen items-center justify-center bg-gray-100 px-4">
  <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-lg">
    <h1 class="mb-2 text-2xl font-bold text-zinc-900">Admin Login</h1>
    <p class="mb-6 text-sm text-gray-500">
      Sign in to access the admin panel.
    </p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="mb-1 block text-sm font-medium text-zinc-700">Username</label>
        <input
          type="text"
          formControlName="username"
          class="w-full rounded-lg border border-gray-300 px-4 py-2 outline-none focus:border-zinc-600"
        />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-zinc-700">Password</label>
        <input
          type="password"
          formControlName="password"
          class="w-full rounded-lg border border-gray-300 px-4 py-2 outline-none focus:border-zinc-600"
        />
      </div>

      <div *ngIf="errorMessage" class="rounded-lg bg-red-100 px-3 py-2 text-sm text-red-700">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full rounded-lg bg-zinc-900 px-4 py-2 text-white transition hover:bg-zinc-800 disabled:opacity-60"
      >
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
