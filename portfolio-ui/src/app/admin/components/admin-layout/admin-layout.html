<div class="min-h-screen bg-gray-100 flex">
  <aside class="w-64 bg-zinc-900 text-white p-5">
    <h2 class="mb-6 text-xl font-bold">Admin Panel</h2>

    <nav class="space-y-2">
      <a
        routerLink="/admin/dashboard"
        routerLinkActive="bg-zinc-700"
        class="block rounded-lg px-4 py-2 transition hover:bg-zinc-800"
      >
        Dashboard
      </a>

      <a
        routerLink="/admin/messages"
        routerLinkActive="bg-zinc-700"
        class="block rounded-lg px-4 py-2 transition hover:bg-zinc-800"
      >
        Messages
      </a>

      <a
        routerLink="/admin/projects"
        routerLinkActive="bg-zinc-700"
        class="block rounded-lg px-4 py-2 transition hover:bg-zinc-800"
      >
        Projects
      </a>

      <a
        routerLink="/admin/meetings"
        routerLinkActive="bg-zinc-700"
        class="block rounded-lg px-4 py-2 transition hover:bg-zinc-800"
      >
        Meeting Requests
      </a>
    </nav>

    <button
      type="button"
      (click)="logout()"
      class="mt-8 w-full rounded-lg bg-red-600 px-4 py-2 text-white transition hover:bg-red-700"
    >
      Logout
    </button>
  </aside>

  <main class="flex-1 p-6">
    <router-outlet></router-outlet>
  </main>
</div>
