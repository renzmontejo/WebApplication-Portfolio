<section class="mb-6 rounded-2xl border border-gray-200 px-8 py-8">
  <p class="text-[12px] font-semibold uppercase tracking-[0.18em] text-gray-400">
    Projects
  </p>

  <h2 class="mt-2 text-[28px] font-bold text-zinc-900">
    Selected Projects
  </h2>

  <div *ngIf="isLoading" class="mt-6 text-sm text-gray-500">
    Loading projects...
  </div>

  <div *ngIf="!isLoading && errorMessage" class="mt-6 text-sm text-red-600">
    {{ errorMessage }}
  </div>

  <div *ngIf="!isLoading && !errorMessage && projects.length === 0" class="mt-6 text-sm text-gray-500">
    No projects available yet.
  </div>

  <div *ngIf="!isLoading && projects.length > 0" class="mt-6 space-y-5">
    <div
      *ngFor="let project of projects"
      class="rounded-2xl border border-gray-200 bg-white p-6"
    >
      <div class="grid grid-cols-1 gap-6 lg:grid-cols-[1fr_220px]">
        <div>
          <h3 class="text-[20px] font-semibold text-zinc-900">
            {{ project.title }}
          </h3>

          <div class="mt-2 flex flex-wrap gap-2 text-xs">
            <span class="rounded-full bg-gray-100 px-3 py-1 font-medium text-zinc-700">
              {{ project.projectType === 'CLIENT' ? 'Client Project' : 'Personal Project' }}
            </span>

            <span class="rounded-full bg-gray-100 px-3 py-1 font-medium text-zinc-700">
              {{ project.dateCreated || 'No date' }}
            </span>
          </div>

          <p class="mt-3 text-[15px] leading-7 text-gray-600">
            {{ project.description }}
          </p>
        </div>

        <div>
          <p class="mb-3 text-[12px] font-semibold uppercase tracking-[0.18em] text-gray-400">
            Tech Stack
          </p>

          <div class="flex flex-col gap-2">
            <ng-container *ngFor="let tech of project.techStack.split(',')">
              <span class="rounded-xl border border-gray-200 bg-gray-50 px-4 py-2 text-sm font-medium text-zinc-700">
                {{ tech.trim() }}
              </span>
            </ng-container>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
