<div class="page">
  <h2>Tool Management</h2>

  <div class="form-card">
    <label for="toolName">Tool Name</label>
    <input
      id="toolName"
      type="text"
      [(ngModel)]="tool.toolName"
      name="toolName"
      placeholder="Enter tool name"
    />

    <button type="button" (click)="save()">Save Tool</button>

    <p class="message">{{ message }}</p>
  </div>

  <div class="list-card">
    <h3>Saved Tool Records</h3>
    <ul>
      <li *ngFor="let item of tools">
        {{ item.toolId }} - {{ item.toolName }}
      </li>
    </ul>
  </div>
</div>
