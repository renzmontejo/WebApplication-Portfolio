<div class="page">
  <h2>Frontend Management</h2>

  <div class="form-card">
    <label for="frontendName">Frontend Name</label>
    <input
      id="frontendName"
      type="text"
      [(ngModel)]="frontend.frontendName"
      name="frontendName"
      placeholder="Enter frontend name"
    />

    <button type="button" (click)="save()">Save Frontend</button>

    <p class="message">{{ message }}</p>
  </div>

  <div class="list-card">
    <h3>Saved Frontend Records</h3>
    <ul>
      <li *ngFor="let item of frontends">
        {{ item.frontendId }} - {{ item.frontendName }}
      </li>
    </ul>
  </div>
</div>
